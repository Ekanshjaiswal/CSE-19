<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Registration Form</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            width: 350px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
            text-align: left; /* Aligns form inputs cleanly */
        }

        .container h2 {
            text-align: center;
            margin-top: 0;
        }

        form {
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            width: 90%;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: darkgreen;
        }

        .error {
            color: red;
            font-size: 14px;
            margin: 0 0 8px 5%;
            text-align: left;
            min-height: 18px; /* Stops page content layout shifting when errors toggle */
        }

        .success {
            color: green;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        .apiData {
            margin-top: 20px;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 4px;
        }

        .apiData ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // Pulling useState hook directly from global React object 
        const { useState } = React;

        function App() {
            const [name, setName] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [errors, setErrors] = useState({});
            const [success, setSuccess] = useState("");
            const [users, setUsers] = useState([]);

            const handleSubmit = (e) => {
                e.preventDefault();
                let formErrors = {};
                
                if (name.trim() === "") {
                    formErrors.name = "Name is required";
                }
                if (!email.includes("@")) {
                    formErrors.email = "Email must contain @";
                }
                if (password.length < 6) {
                    formErrors.password = "Password must be at least 6 characters";
                }
                
                setErrors(formErrors);
                
                if (Object.keys(formErrors).length === 0) {
                    const newUser = { name: name, email: email };
                    setUsers([...users, newUser]);
                    setSuccess("Registration Successful!");
                    
                    // Clear fields and drop old errors
                    setName("");
                    setEmail("");
                    setPassword("");
                    setErrors({});
                } else {
                    setSuccess(""); // Wipe success notice if form fails validation later
                }
            };

            return (
                <div className="container">
                    <h2>Registration Form</h2>
                    <form onSubmit={handleSubmit}>
                        <input 
                            type="text" 
                            placeholder="Enter Name" 
                            value={name} 
                            onChange={(e) => setName(e.target.value)} 
                        />
                        <p className="error">{errors.name}</p>
                        
                        <input 
                            type="email" 
                            placeholder="Enter Email" 
                            value={email} 
                            onChange={(e) => setEmail(e.target.value)} 
                        />
                        <p className="error">{errors.email}</p>
                        
                        <input 
                            type="password" 
                            placeholder="Enter Password" 
                            value={password} 
                            onChange={(e) => setPassword(e.target.value)} 
                        />
                        <p className="error">{errors.password}</p>
                        
                        <button type="submit">Register</button>
                    </form>
                    <p className="success">{success}</p>
                    
                    {users.length > 0 && (
                        <div className="apiData">
                            <h3>Registered Users</h3>
                            <ul>
                                {users.map((user, index) => (
                                    <li key={index}>
                                        {user.name} - {user.email}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            );
        }

        // Mount to index DOM
        const container = document.getElementById("root");
        const root = ReactDOM.createRoot(container);
        root.render(
            <React.StrictMode>
                <App />
            </React.StrictMode>
        );
    </script>
</body>
</html>
