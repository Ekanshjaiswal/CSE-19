<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 8px;
            width: 80%;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }

        button:hover {
            background-color: darkblue;
        }

        .subject-input-group {
            margin-top: 10px;
            text-align: left;
            padding-left: 10%;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Student Result Calculator</h2>
        
        <div id="setup-stage">
            <label for="subjects">Enter Number of Subjects</label><br>
            <input type="number" id="subjects" min="1" placeholder="e.g., 5"><br>
            <button onclick="generateFields()">Next</button>
        </div>

        <div id="dynamic-inputs"></div>

        <div id="result"></div>
    </div>

    <script>
        // Function to dynamically generate input fields for marks
        function generateFields() {
            const numSubjects = document.getElementById('subjects').value;
            const inputsContainer = document.getElementById('dynamic-inputs');
            const resultDiv = document.getElementById('result');
            
            // Clear previous fields and results
            inputsContainer.innerHTML = '';
            resultDiv.innerHTML = '';

            if (numSubjects <= 0 || numSubjects === '') {
                alert('Please enter a valid number of subjects.');
                return;
            }

            // Create inputs for each subject
            for (let i = 1; i <= numSubjects; i++) {
                const div = document.createElement('div');
                div.className = 'subject-input-group';
                div.innerHTML = `
                    <label>Subject ${i} Marks:</label><br>
                    <input type="number" class="subject-marks" min="0" max="100" placeholder="Marks out of 100">
                `;
                inputsContainer.appendChild(div);
            }

            // Add the final Calculate button
            const calcButton = document.createElement('button');
            calcButton.innerText = "Calculate Result";
            calcButton.onclick = calculateResult;
            inputsContainer.appendChild(calcButton);
        }

        // Function to calculate Total, Percentage, and Pass/Fail status
        function calculateResult() {
            const markInputs = document.querySelectorAll('.subject-marks');
            let totalMarks = 0;
            let totalSubjects = markInputs.length;
            let failed = false;

            for (let i = 0; i < totalSubjects; i++) {
                let mark = parseFloat(markInputs[i].value);

                // Validation
                if (isNaN(mark) || mark < 0 || mark > 100) {
                    alert(`Please enter valid marks (0-100) for Subject ${i + 1}.`);
                    return;
                }

                totalMarks += mark;

                // Assuming passing marks per subject is 33
                if (mark < 33) {
                    failed = true;
                }
            }

            // Calculations
            const maxPossibleMarks = totalSubjects * 100;
            const percentage = ((totalMarks / maxPossibleMarks) * 100).toFixed(2);
            let status = (failed || percentage < 33) ? "FAILED ❌" : "PASSED 🎉";

            // Display result
            document.getElementById('result').innerHTML = `
                <hr style="border: 0; border-top: 1px solid #ccc; margin: 20px 0;">
                Total Marks: ${totalMarks} / ${maxPossibleMarks}<br>
                Percentage: ${percentage}%<br>
                Status: <span style="color: ${status.includes('PASSED') ? 'green' : 'red'}">${status}</span>
            `;
        }
    </script>
</body>
</html>
