<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Student Component</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        .student-card {
            background: white;
            width: 250px;
            padding: 15px;
            margin: 15px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .student-card h2 {
            color: #2c3e50;
        }

        .student-card p {
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // 1. Child Component: Student
        function Student(props) {
            return (
                <div className="student-card">
                    <h2>{props.name}</h2>
                    <p>Course: {props.course}</p>
                    <p>Marks: {props.marks}</p>
                </div>
            );
        }

        // 2. Parent Component: App
        function App() {
            return (
                <div>
                    <h1>Student Information</h1>
                    <Student name="Rahul Sharma" course="Computer Science" marks="85" />
                    <Student name="Anita Verma" course="Information Technology" marks="92" />
                    <Student name="Rohan Gupta" course="Electronics" marks="78" />
                </div>
            );
        }

        // 3. Root Mounting Logic (React 18 standard)
        const container = document.getElementById("root");
        const root = ReactDOM.createRoot(container);
        root.render(
            <React.StrictMode>
                <App />
            </React.StrictMode>
        );

    </script>
</body>
</html>
